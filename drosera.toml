ethereum_rpc = "https://ethereum-rpc.publicnode.com"
drosera_rpc = "https://relay.ethereum.drosera.io"
eth_chain_id = 1
drosera_address = "0x01C344b8406c3237a6b9dbd06ef2832142866d87"

[traps.templedao_migration_backing_trap]
path = "out/TempleMigrationBackingTrap.sol/TempleMigrationBackingTrap.json"

# Replace this sentinel with the deployed TempleMigrationRiskResponse address
# before running `drosera apply`. It is intentionally non-zero so config review
# catches accidental use, but it is not a deployed response contract.
response_contract = "0x1111111111111111111111111111111111111111"
response_function = "handleIncident((bytes32,bytes32,address,uint256,uint256,uint256,address,address,uint256,bytes32,bytes))"

cooldown_period_blocks = 5
min_number_of_operators = 1
max_number_of_operators = 3
block_sample_size = 3
private_trap = false
whitelist = []

[alerts.telegram]
enabled = true
sink_contract = "0x2222222222222222222222222222222222222222"
event = "TelegramAlertRequested(bytes32,bytes32,address,uint256,uint256,uint256,address,address,uint256,bytes32)"
webhook_url = "https://YOUR_WEBHOOK_HOST/drosera/templedao"
webhook_secret_header = "x-webhook-secret"

[inputs.templedao]
environment_id = "0x026040bf33ba210d54fc1e1788bbf2b3e7d89f32372e9bb3caf3e4e8edf5d3df"
registry = "0x0000000000000000000000000000000000007101"
historical_stax_contract = "0xd2869042E12a3506100af1D192b5b04D65137941"
historical_attacker = "0x9c9Fb3100A2a521985F0c47DE3B4598dafD25B01"
invariant = "creditedStake must be backed by LP token balance; migration oldStaking must be trusted"
