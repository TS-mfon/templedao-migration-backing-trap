ethereum_rpc = "https://ethereum-hoodi-rpc.publicnode.com"
drosera_rpc = "https://relay.hoodi.drosera.io"
eth_chain_id = 560048
drosera_address = "0x91cB447BaFc6e0EA0F4Fe056F5a9b1F14bb06e5D"

[traps.templedao_migration_backing_trap]
address = "0x2819EeB9693220209991F67De80AB012592A8FD5"
path = "out/TempleMigrationBackingTrap.sol/TempleMigrationBackingTrap.json"

# Hoodi TempleMigrationRiskResponse deployment.
response_contract = "0x0b40C110ddE26C964f755DEecA90046C41bBa092"
response_function = "handleIncident((bytes32,bytes32,address,uint256,uint256,uint256,address,address,uint256,uint256,uint256,bytes32,bytes))"

cooldown_period_blocks = 5
min_number_of_operators = 3
max_number_of_operators = 7
block_sample_size = 3
# Must equal TempleMigrationBackingTrap.REQUIRED_SAMPLES.
# The trap rejects shorter and longer windows to keep invariant semantics fixed.
private_trap = false
whitelist = ["0xEd9EDd8586b20524CafA4F568413C504C9B03172"]

[alerts.telegram]
enabled = true
sink_contract = "0x0232563a0BCc28123BE645Ae8058F66688e3c28B"
event = "TelegramAlertRequested(bytes32,bytes32,address,uint256,uint256,uint256,address,address,uint256,uint256,uint256,bytes32)"
webhook_url = "https://YOUR_WEBHOOK_HOST/drosera/templedao"
webhook_secret_header = "x-webhook-secret"

[inputs.templedao]
environment_id = "0x026040bf33ba210d54fc1e1788bbf2b3e7d89f32372e9bb3caf3e4e8edf5d3df"
registry = "0xFD8Ab47B2D53f768baDAB66cf07C401522A450bd"
monitored_target = "0x8F2966776f3eADfD065A2FBEE6B4906D355c0B04"
# TempleMigrationBackingTrap reads TrapDeployConfig.REGISTRY and
# TrapDeployConfig.MONITORED_TARGET at compile time.
# Rebuild after generating TrapDeployConfig.sol with the deployed registry and
# monitored target.
historical_stax_contract = "0xd2869042E12a3506100af1D192b5b04D65137941"
historical_attacker = "0x9c9Fb3100A2a521985F0c47DE3B4598dafD25B01"
invariant = "creditedStake must be backed by LP token balance; migration oldStaking must be trusted"
